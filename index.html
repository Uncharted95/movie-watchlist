<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <img class="header-image" src="images/posters.jpg">
            <div class="header-content">
                <h1>Find your film</h1>
                <nav>
                    <a href="watchlist.html">My Watchlist</a>
                </nav>
            </div>
        </header>
        <main>
            <div class="search-bar">
                <input type="search" aria-label="search" autocomplete="off" 
                id="site-search" name="search" placeholder="Search for a movie">
                <button id="button">Search</button>
            </div>
            <div class="film-icon">
                <img class="film-movie-icon" src="images/movie.jpg">
                <p class="film-site-text">Start Exploring</p>
            </div>
            <div id="films">
                <div class="film"></div>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
